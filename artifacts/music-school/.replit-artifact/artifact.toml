kind = "web"
previewPath = "/"
title = "Music Teaching Platform"
version = "1.0.0"
id = "artifacts/music-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18900
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/music-school run dev"

[services.env]
PORT = "18900"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/music-school", "run", "build"]
publicDir = "artifacts/music-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
