openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Music Teaching Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: classes
    description: Class management
  - name: announcements
    description: Announcements
  - name: students
    description: Student management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login for teacher or student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students (teacher only)
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student (teacher only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{studentId}:
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student (teacher only)
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List classes
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"
    post:
      operationId: createClass
      tags: [classes]
      summary: Schedule a class (teacher only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassRequest"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  /classes/{classId}:
    put:
      operationId: updateClass
      tags: [classes]
      summary: Update/reschedule a class (teacher only)
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassRequest"
      responses:
        "200":
          description: Class updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"
    delete:
      operationId: deleteClass
      tags: [classes]
      summary: Delete a class (teacher only)
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Class deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create announcement (teacher only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{announcementId}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete announcement (teacher only)
      parameters:
        - name: announcementId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Announcement deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginRequest:
      type: object
      properties:
        userId:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [teacher, student]
      required:
        - userId
        - password
        - role

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        role:
          type: string
          enum: [teacher, student]
        userId:
          type: string
        name:
          type: string
        studentId:
          type: integer
          nullable: true
      required:
        - success
        - role
        - userId
        - name

    UserInfo:
      type: object
      properties:
        role:
          type: string
          enum: [teacher, student]
        userId:
          type: string
        name:
          type: string
        studentId:
          type: integer
          nullable: true
      required:
        - role
        - userId
        - name

    Student:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: string
        name:
          type: string
        instrument:
          type: string
        createdAt:
          type: string
      required:
        - id
        - studentId
        - name
        - instrument
        - createdAt

    CreateStudentRequest:
      type: object
      properties:
        name:
          type: string
        instrument:
          type: string
      required:
        - name
        - instrument

    Class:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        scheduledAt:
          type: string
        durationMinutes:
          type: integer
        topic:
          type: string
        status:
          type: string
          enum: [scheduled, ongoing, completed, cancelled]
        meetingLink:
          type: string
      required:
        - id
        - title
        - scheduledAt
        - durationMinutes
        - topic
        - status

    CreateClassRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        scheduledAt:
          type: string
        durationMinutes:
          type: integer
        topic:
          type: string
      required:
        - title
        - scheduledAt
        - durationMinutes
        - topic

    UpdateClassRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        scheduledAt:
          type: string
        durationMinutes:
          type: integer
        topic:
          type: string
        status:
          type: string
          enum: [scheduled, ongoing, completed, cancelled]

    Announcement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string
        isPinned:
          type: boolean
      required:
        - id
        - title
        - content
        - createdAt
        - isPinned

    CreateAnnouncementRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        isPinned:
          type: boolean
      required:
        - title
        - content

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
